name: Publish cloud images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Image and package version
        required: false
        default: latest
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    env:
      POSTGRES_PASSWORD: ci-only-password
      SECRET_KEY: ci-only-secret-key-with-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Validate Compose and deployment packages
        run: |
          docker compose --profile production --profile gpu config --quiet
          CERTIPROOF_VERSION=ci ./scripts/package-cloud-deployment.sh all
      - name: Build backend test image
        run: docker compose build backend
      - name: Run backend tests
        run: |
          docker compose run --rm -T --no-deps \
            -v "$PWD/tests:/workspace/tests:ro" \
            -v "$PWD/mcp-servers:/workspace/mcp-servers:ro" \
            -v "$PWD/reference:/workspace/reference:ro" \
            -v "$PWD/deploy:/workspace/deploy:ro" \
            -v "$PWD/docker-compose.yml:/workspace/docker-compose.yml:ro" \
            -w /workspace -e PYTHONPATH=/app backend pytest -q tests
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

  publish:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Select version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and publish linux/amd64 images
        env:
          CERTIPROOF_IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/certiproof
          CERTIPROOF_VERSION: ${{ steps.version.outputs.value }}
          CERTIPROOF_PLATFORMS: linux/amd64
        run: docker buildx bake --push
      - name: Build CPU and GPU deployment packages
        env:
          CERTIPROOF_VERSION: ${{ steps.version.outputs.value }}
        run: ./scripts/package-cloud-deployment.sh all
      - uses: actions/upload-artifact@v4
        with:
          name: certiproof-cloud-${{ steps.version.outputs.value }}
          path: dist/cloud/*
          if-no-files-found: error

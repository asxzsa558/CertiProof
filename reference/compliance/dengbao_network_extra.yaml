name: "等保网络与剩余条款（第四批）"
standard: "GB/T 22239-2019"
version: "1.0"
description: "补充的网络和剩余等保条款"
base: "dengbao_base"

clauses:
  # ===== 8.1.2 通信网络补充 P1 条款 =====
  - id: "8.1.2.21"
    name: "IPv6 安全"
    pillar: "network"
    level: [3]
    check_type: "questionnaire"
    description: "应保护 IPv6 网络安全"
    weight: 1.5
    questionnaire:
      questions:
        - id: "q1"
          text: "是否部署了 IPv6 安全防护？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "IPv6 是否有独立的安全策略？"
          type: "yes_no"
          evidence_required: true
      pass_threshold: 1.0
    remediation:
      immediate:
        - "评估 IPv6 安全风险"
      short_term:
        - "部署 IPv6 防护"
      long_term:
        - "完善 IPv6 治理"
    risk_level: "medium"
    usage_frequency: "low"

  - id: "8.1.2.22"
    name: "网络 QoS"
    pillar: "network"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应实施网络 QoS 保障关键业务"
    weight: 1.5
    questionnaire:
      questions:
        - id: "q1"
          text: "是否对关键业务实施 QoS 保障？"
          type: "yes_no"

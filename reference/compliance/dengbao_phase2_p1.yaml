name: "等保阶段2 P1 补充条款（第五批）"
standard: "GB/T 22239-2019"
version: "1.0"
description: "补充更多等保 P1 条款以达到 90% 覆盖率"
base: "dengbao_base"

clauses:
  # ===== 8.1.4 计算环境更多细节 =====
  - id: "8.1.4.26"
    name: "代码审计"
    pillar: "computing"
    level: [2, 3]
    check_type: "document"
    description: "应定期开展代码安全审计"
    weight: 2.0
    document:
      required_docs:
        - "代码审计报告"
        - "漏洞修复记录"
    pass_threshold: 1.0
    remediation:
      immediate:
        - "建立代码审计机制"
      short_term:
        - "定期审计"
      long_term:
        - "自动化审计"
    risk_level: "high"
    usage_frequency: "medium"

  - id: "8.1.4.27"
    name: "渗透测试"
    pillar: "computing"
    level: [3]
    check_type: "document"
    description: "应定期开展渗透测试"
    weight: 2.5
    document:
      required_docs:
        - "渗透测试方案"
        - "渗透测试报告"
        - "漏洞修复记录"
    pass_threshold: 1.0
    remediation:
      immediate:
        - "制定渗透测试计划"
      short_term:
        - "开展渗透测试"
      long_term:
        - "持续改进"
    risk_level: "high"
    usage_frequency: "medium"

  - id: "8.1.4.28"
    name: "漏洞扫描"
    pillar: "computing"
    level: [2, 3]
    check_type: "scan"
    description: "应定期开展漏洞扫描"
    weight: 2.5
    tools:
      - name: "nuclei_scan"
        params:
          target: "{{asset}}"
          severity: "critical,high,medium"
          templates: "cve,misconfig,exposure"
        output_key: "vuln_scan_result"
    pass_condition: "no_critical_vulns"
    remediation:
      immediate:
        - "部署漏洞扫描"
      short_term:
        - "修复已知漏洞"
      long_term:
        - "建立漏洞管理"
    risk_level: "high"
    usage_frequency: "high"

  - id: "8.1.4.29"
    name: "配置审计"
    pillar: "computing"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应定期开展系统配置审计"
    weight: 2.0
    questionnaire:
      questions:
        - id: "q1"
          text: "是否定期进行系统配置审计？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "配置审计是否覆盖所有关键系统？"
          type: "yes_no"
          evidence_required: true
      pass_threshold: 1.0
    remediation:
      immediate:
        - "建立配置审计"
      short_term:
        - "定期审计"
      long_term:
        - "自动化审计"
    risk_level: "medium"
    usage_frequency: "medium"

  - id: "8.1.4.30"
    name: "安全事件响应"
    pillar: "computing"
    level: [2, 3]
    check_type: "document"
    description: "应建立安全事件响应流程"
    weight: 2.5
    document:
      required_docs:
        - "事件响应计划"
        - "响应流程图"
        - "演练记录"
    pass_threshold: 1.0
    remediation:
      immediate:
        - "制定响应计划"
      short_term:
        - "建立响应团队"
      long_term:
        - "持续改进"
    risk_level: "high"
    usage_frequency: "medium"

  - id: "8.1.4.31"
    name: "加密算法合规"
    pillar: "computing"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应使用国家认可的加密算法"
    weight: 2.5
    questionnaire:
      questions:
        - id: "q1"
          text: "是否使用国家认可的商用密码算法？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否避免使用已破解的算法（如MD5、SHA1）？"
          type: "yes_no"
          evidence_required: true
      pass_threshold: 1.0
    remediation:
      immediate:
        - "审查加密算法"
      short_term:
        - "替换不安全算法"
      long_term:
        - "建立密码管理体系"
    risk_level: "high"
    usage_frequency: "high"

  - id: "8.1.4.32"
    name: "密钥管理"
    pillar: "computing"
    level: [2, 3]
    check_type: "document"
    description: "应建立密钥管理体系"
    weight: 2.5
    document:
      required_docs:
        - "密钥管理制度"
        - "密钥生成记录"
        - "密钥更新记录"
        - "密钥销毁记录"
    pass_threshold: 1.0
    remediation:
      immediate:
        - "建立密钥管理制度"
      short_term:
        - "实施密钥生命周期管理"
      long_term:
        - "建立 KMS"
    risk_level: "high"
    usage_frequency: "medium"

  - id: "8.1.4.33"
    name: "安全开发生命周期"
    pillar: "computing"
    level: [3]
    check_type: "document"
    description: "应建立安全开发生命周期（SDL）"
    weight: 2.5
    document:
      required_docs:
        - "SDL 规范"
        - "威胁建模报告"
        - "代码审计报告"
        - "安全测试报告"
    pass_threshold: 1.0
    remediation:
      immediate:
        - "建立 SDL 规范"
      short_term:
        - "实施 SDL"
      long_term:
        - "持续改进"
    risk_level: "high"
    usage_frequency: "medium"

  # ===== 8.1.3 更多细节 =====

    pillar: "boundary"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应对不同安全等级的网络进行分段隔离"
    weight: 2.5
    questionnaire:
      questions:
        - id: "q1"
          text: "是否根据业务重要程度划分安全域？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "安全域之间是否有访问控制？"
          type: "yes_no"
          evidence_required: true
      pass_threshold: 1.0
    remediation:
      immediate:
        - "划分安全域"
      short_term:
        - "实施访问控制"
      long_term:
        - "微分段"
    risk_level: "high"
    usage_frequency: "medium"

  - id: "8.1.3.18"
    name: "无线网络管控"
    pillar: "boundary"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应对无线网络进行管控"
    weight: 2.0
    questionnaire:
      questions:
        - id: "q1"
          text: "是否对无线设备实施认证？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否部署无线入侵检测？"
          type: "yes_no"
          evidence_required: true
        - id: "q3"
          text: "访客无线网络是否与业务网络隔离？"
          type: "yes_no"
          evidence_required: true
      pass_threshold: 1.0
    remediation:
      immediate:
        - "部署无线认证"
      short_term:
        - "实施 WIDS"
      long_term:
        - "建立无线管理体系"
    risk_level: "medium"
    usage_frequency: "medium"

  - id: "8.1.3.19"
    name: "远程访问控制"
    pillar: "boundary"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应对远程访问进行严格控制"
    weight: 2.5

          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否实施双因素认证？"
          type: "yes_no"
          evidence_required: true
        - id: "q3"
          text: "是否记录远程访问日志？"
          type: "yes_no"
          evidence_required: true
      pass_threshold: 1.0
    remediation:
      immediate:
        - "部署 VPN"
      short_term:
        - "实施双因素"
      long_term:
        - "零信任远程访问"
    risk_level: "high"
    usage_frequency: "high"


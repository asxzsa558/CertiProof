# 安全红线
safety_boundaries:
  - id: "no_db_pentest"
    rule: "禁止对数据库端口(3306,5432,1433,6379,27017)进行渗透测试"
    ports: [3306, 5432, 1433, 6379, 27017]
    action: "skip"
  
  - id: "max_brute_attempts"
    rule: "密码暴力破解不能超过 3 次尝试"
    max_attempts: 3
    action: "limit"
  
  - id: "authorized_time_window"
    rule: "扫描必须在授权时间窗口内执行"
    check: "authorization_valid"
    action: "abort"
  
  - id: "verified_ownership"
    rule: "禁止对未验证所有权的资产执行任何扫描"
    check: "ownership_verified"
    action: "abort"

# 评分规则
scoring:
  pass: 1.0
  partial: 0.5
  fail: 0.0
  formula: "SUM(clause_score * weight) / SUM(weight) * 100"
  
  # 分数等级
  levels:
    - min: 90
      max: 100
      name: "优秀"
      color: "#10b981"
    - min: 75
      max: 89
      name: "良好"
      color: "#6366f1"
    - min: 60
      max: 74
      name: "一般"
      color: "#f59e0b"
    - min: 40
      max: 59
      name: "较差"
      color: "#f97316"
    - min: 0
      max: 39
      name: "危险"
      color: "#ef4444"

# 输出配置
output:
  evidence_format: "json"
  report_types: ["pdf", "csv", "json"]
  
  # 证据链结构
  evidence_schema:
    required_fields:
      - clause_id
      - clause_name
      - check_time
      - tool_used
      - raw_result
      - judgment
      - evidence_data

name: "等保基础条款库"
standard: "GB/T 22239-2019"
version: "2.0"
description: "等保二级和三级共享的检查条款"

# 条款分类（10大支柱）
pillars:
  - id: "physical"
    name: "安全物理环境"
    description: "机房、物理访问控制等"
    
  - id: "network"
    name: "安全通信网络"
    description: "网络架构、通信传输等"
    
  - id: "boundary"
    name: "安全区域边界"
    description: "边界防护、访问控制等"
    
  - id: "computing"
    name: "安全计算环境"
    description: "身份鉴别、访问控制、安全审计等"
    
  - id: "management_center"
    name: "安全管理中心"
    description: "系统管理、审计管理、集中管控"
    
  - id: "policy"
    name: "安全管理制度"
    description: "制度文档、管理流程"
    
  - id: "organization"
    name: "安全管理机构"
    description: "组织架构、职责分工"
    
  - id: "personnel"
    name: "安全管理人员"
    description: "人员管理、培训考核"
    
  - id: "construction"
    name: "安全建设管理"
    description: "项目建设、产品采购"
    
  - id: "operation"
    name: "安全运维管理"
    description: "日常运维、变更管理"

# 检查条款（共享部分）
clauses:
  # ===== 安全物理环境 =====
  - id: "8.1.1.1.1"
    name: "物理位置选择"
    pillar: "physical"
    level: [2, 3]
    check_type: "questionnaire"
    description: "机房应选择在具有防震、防风和防雨等能力的建筑内"
    questionnaire:
      questions:
        - id: "q1"
          text: "机房是否位于具有防震、防风、防雨能力的建筑内？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否远离强电磁场、强振动源？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  - id: "8.1.1.1.2"
    name: "物理访问控制"
    pillar: "physical"
    level: [2, 3]
    check_type: "questionnaire"
    description: "机房出入口应配置电子门禁系统，控制、鉴别和记录进入的人员"
    questionnaire:
      questions:
        - id: "q1"
          text: "机房出入口是否配置了电子门禁系统？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "门禁系统是否能够记录人员进出信息？"
          type: "yes_no"
          evidence_required: true
        - id: "q3"
          text: "是否有专人值守或监控？"
          type: "yes_no"
          evidence_required: true
    weight: 2.5
    pass_threshold: 1.0

  - id: "8.1.1.1.3"
    name: "防盗窃和防破坏"
    pillar: "physical"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应将设备或主要部件进行固定，并设置明显的不易去除的标识"
    questionnaire:
      questions:
        - id: "q1"
          text: "设备是否进行了固定（如机柜上锁）？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "设备是否设置了不易去除的标识？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  - id: "8.1.1.1.4"
    name: "防雷击"
    pillar: "physical"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应将各类机柜、设施和设备等通过安全地方式接地"
    questionnaire:
      questions:
        - id: "q1"
          text: "机房是否安装了防雷设施？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "设备是否通过安全地方式接地？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  - id: "8.1.1.1.5"
    name: "防火"
    pillar: "physical"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应设置灭火设备，并采用自动消防设施"
    questionnaire:
      questions:
        - id: "q1"
          text: "机房是否设置了灭火设备？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否采用自动消防设施（如气体灭火）？"
          type: "yes_no"
          evidence_required: true
        - id: "q3"
          text: "机房建筑材料是否采用耐火材料？"
          type: "yes_no"
          evidence_required: true
    weight: 2.0
    pass_threshold: 1.0

  - id: "8.1.1.1.6"
    name: "防水和防潮"
    pillar: "physical"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应采取措施防止雨水渗透，对系统设备进行防水和防潮处理"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否采取措施防止雨水渗透机房？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否对系统设备进行防水和防潮处理？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  - id: "8.1.1.1.7"
    name: "防静电"
    pillar: "physical"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应采用防静电地板，关键设备应采取防静电措施"
    questionnaire:
      questions:
        - id: "q1"
          text: "机房是否采用防静电地板？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "关键设备是否采取防静电措施？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  - id: "8.1.1.1.8"
    name: "温湿度控制"
    pillar: "physical"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应配备温湿度调节设施，使机房温湿度满足要求"
    questionnaire:
      questions:
        - id: "q1"
          text: "机房是否配备温湿度调节设施（如空调）？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "温湿度是否满足设备运行要求？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  - id: "8.1.1.1.9"
    name: "电力供应"
    pillar: "physical"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应在机房供电线路上配置稳压器和过电压防护设备，应提供短期的备用电力供应"
    questionnaire:
      questions:
        - id: "q1"
          text: "供电线路上是否配置稳压器和过电压防护设备？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否提供短期的备用电力供应（如UPS）？"
          type: "yes_no"
          evidence_required: true
    weight: 2.0
    pass_threshold: 1.0

  - id: "8.1.1.1.10"
    name: "电磁防护"
    pillar: "physical"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应采用接地方式防止静电，应采用电源线滤波器等防止电磁干扰"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否采用接地方式防止静电？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否采用电源线滤波器防止电磁干扰？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  # ===== 安全通信网络 =====
  - id: "8.1.2.1"
    name: "网络架构安全"
    pillar: "network"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应保证网络设备的业务处理能力具备冗余，应保证网络各个部分的带宽满足业务高峰期需要"
    questionnaire:
      questions:
        - id: "q1"
          text: "网络设备是否具备冗余（如双机热备）？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "网络带宽是否满足业务高峰期需要？"
          type: "yes_no"
          evidence_required: true
        - id: "q3"
          text: "是否划分不同的网络区域（如DMZ、内网）？"
          type: "yes_no"
          evidence_required: true
    weight: 2.5
    pass_threshold: 1.0

  - id: "8.1.2.2"
    name: "通信传输加密"
    pillar: "network"
    level: [2, 3]
    check_type: "scan"
    description: "应采用密码技术保证通信过程中数据的保密性和完整性"
    tools:
      - name: "testssl_scan"
        params:
          target: "{{asset}}"
          port: 443
        output_key: "ssl_result"
    pass_condition: "tls_version >= '1.2' and no_weak_ciphers"
    weight: 2.0

  - id: "8.1.2.3"
    name: "可信验证"
    pillar: "network"
    level: [3]
    check_type: "questionnaire"
    description: "应基于可信根对通信设备的系统引导程序、系统程序等进行可信验证"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否基于可信根对通信设备进行可信验证？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  # ===== 安全区域边界 =====
  - id: "8.1.3.1"
    name: "边界防护"
    pillar: "boundary"
    level: [2, 3]
    check_type: "scan"
    description: "应保证跨越边界的访问和数据流通过边界设备提供的受控接口进行通信"
    tools:
      - name: "nmap_scan"
        params:
          target: "{{asset}}"
          port_range: "1-65535"
          service_detection: true
        output_key: "port_scan_result"
    pass_condition: "no_critical_ports_exposed"
    weight: 2.5

  - id: "8.1.3.2"
    name: "访问控制"
    pillar: "boundary"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应在网络边界根据访问控制策略设置访问控制规则"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否在网络边界部署了防火墙？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "防火墙是否根据访问控制策略设置规则？"
          type: "yes_no"
          evidence_required: true
        - id: "q3"
          text: "是否默认拒绝所有未明确允许的访问？"
          type: "yes_no"
          evidence_required: true
    weight: 2.5
    pass_threshold: 1.0

  - id: "8.1.3.3"
    name: "入侵防范"
    pillar: "boundary"
    level: [2, 3]
    check_type: "scan"
    description: "应在关键网络节点处检测、防止或限制从外部发起的网络攻击行为"
    tools:
      - name: "nuclei_scan"
        params:
          target: "{{asset}}"
          severity: "critical,high"
          templates: "cve,misconfig,exposure"
        output_key: "vuln_result"
    pass_condition: "no_critical_vulns"
    weight: 2.0

  - id: "8.1.3.4"
    name: "恶意代码防范"
    pillar: "boundary"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应安装防恶意代码软件或配置具有防恶意代码功能的产品，并定期更新防恶意代码库"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否安装防恶意代码软件（如杀毒软件）？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否定期更新防恶意代码库？"
          type: "yes_no"
          evidence_required: true
    weight: 2.0
    pass_threshold: 1.0

  - id: "8.1.3.5"
    name: "安全审计"
    pillar: "boundary"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应在网络边界、重要网络节点进行安全审计，记录网络活动"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否在网络边界进行安全审计？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "审计记录是否包括事件的日期和时间、用户、事件类型、事件是否成功等？"
          type: "yes_no"
          evidence_required: true
    weight: 2.0
    pass_threshold: 1.0

  # ===== 安全计算环境 =====
  - id: "8.1.4.1"
    name: "身份鉴别"
    pillar: "computing"
    level: [2, 3]
    check_type: "scan"
    description: "应对登录的用户进行身份标识，鉴别用户身份，并具有登录失败处理功能"
    tools:
      - name: "nmap_scan"
        params:
          target: "{{asset}}"
          port_range: "22"
          service_detection: true
        output_key: "ssh_info"
      - name: "hydra_bruteforce"
        params:
          target: "{{asset}}"
          service: "ssh"
          port: 22
          max_attempts: 3
        output_key: "brute_result"
        depends_on: "ssh_info"
    pass_condition: "no_weak_passwords"
    weight: 3.0

  - id: "8.1.4.2"
    name: "访问控制"
    pillar: "computing"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应对主体和客体设置安全标记，并依据安全标记和主体、客体的安全属性进行访问控制"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否对主体（用户）设置安全标记（如角色）？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否对客体（资源）设置安全标记（如密级）？"
          type: "yes_no"
          evidence_required: true
        - id: "q3"
          text: "是否依据安全标记进行访问控制？"
          type: "yes_no"
          evidence_required: true
    weight: 2.5
    pass_threshold: 1.0

  - id: "8.1.4.3"
    name: "安全审计"
    pillar: "computing"
    level: [2, 3]
    check_type: "scan"
    description: "应提供安全审计功能，审计覆盖到每个用户，对重要的用户行为和重要安全事件进行审计"
    tools:
      - name: "nmap_scan"
        params:
          target: "{{asset}}"
          port_range: "514,1514"
          service_detection: true
        output_key: "syslog_info"
    pass_condition: "syslog_service_detected"
    weight: 2.0

  - id: "8.1.4.4"
    name: "入侵防范"
    pillar: "computing"
    level: [2, 3]
    check_type: "scan"
    description: "应遵循最小安装的原则，仅安装需要的组件和应用程序，关闭不需要的系统服务、默认共享和高危端口"
    tools:
      - name: "nuclei_scan"
        params:
          target: "{{asset}}"
          severity: "critical,high"
          templates: "cve,misconfig"
        output_key: "vuln_result"
    pass_condition: "no_critical_vulns"
    weight: 2.0

  - id: "8.1.4.5"
    name: "恶意代码防范"
    pillar: "computing"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应安装防恶意代码软件，定期进行扫描和查杀，并定期更新防恶意代码库"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否安装防恶意代码软件？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否定期进行扫描和查杀？"
          type: "yes_no"
          evidence_required: true
        - id: "q3"
          text: "是否定期更新防恶意代码库？"
          type: "yes_no"
          evidence_required: true
    weight: 2.0
    pass_threshold: 1.0

  - id: "8.1.4.6"
    name: "可信验证"
    pillar: "computing"
    level: [3]
    check_type: "questionnaire"
    description: "应基于可信根对系统的引导程序、系统程序、重要配置参数和应用程序等进行可信验证"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否基于可信根对系统进行可信验证？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  - id: "8.1.4.7"
    name: "数据完整性"
    pillar: "computing"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应采用校验技术保证数据在传输过程中的完整性"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否采用校验技术（如哈希、数字签名）保证数据完整性？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  - id: "8.1.4.8"
    name: "数据保密性"
    pillar: "computing"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应采用密码技术保证数据在传输和存储过程中的保密性"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否采用密码技术保证数据传输的保密性？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否采用密码技术保证数据存储的保密性？"
          type: "yes_no"
          evidence_required: true
    weight: 2.0
    pass_threshold: 1.0

  - id: "8.1.4.9"
    name: "数据备份恢复"
    pillar: "computing"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应提供重要数据的本地备份和恢复功能，应提供重要数据的异地备份功能"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否提供重要数据的本地备份功能？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否提供重要数据的异地备份功能？"
          type: "yes_no"
          evidence_required: true
    weight: 2.0
    pass_threshold: 1.0

  - id: "8.1.4.10"
    name: "剩余信息保护"
    pillar: "computing"
    level: [3]
    check_type: "questionnaire"
    description: "应保证鉴别信息所在的存储空间被重新分配时，鉴别信息得到完全清除"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否保证鉴别信息所在的存储空间被重新分配时，鉴别信息得到完全清除？"
          type: "yes_no"
          evidence_required: true
    weight: 1.0
    pass_threshold: 1.0

  - id: "8.1.4.11"
    name: "个人信息保护"
    pillar: "computing"
    level: [3]
    check_type: "questionnaire"
    description: "应仅采集和保存业务必需的用户个人信息，应禁止未授权访问和非法使用用户个人信息"
    questionnaire:
      questions:
        - id: "q1"
          text: "是否仅采集和保存业务必需的用户个人信息？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "是否禁止未授权访问和非法使用用户个人信息？"
          type: "yes_no"
          evidence_required: true
    weight: 1.5
    pass_threshold: 1.0

  # ===== 安全管理制度 =====
  - id: "8.1.5.1.1"
    name: "策略和制度"
    pillar: "policy"
    level: [2, 3]
    check_type: "document"
    description: "应制定信息安全工作的总体方针和政策，建立信息安全管理体系"
    document:
      required_docs:
        - "信息安全方针和政策"
        - "信息安全管理制度"
    weight: 2.0

  - id: "8.1.5.1.2"
    name: "管理制度"
    pillar: "policy"
    level: [2, 3]
    check_type: "document"
    description: "应建立信息安全管理的制度体系，包括人员、资产、运维等方面的管理制度"
    document:

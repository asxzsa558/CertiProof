name: "等保阶段2 最终补充（第六批）"
standard: "GB/T 22239-2019"
version: "1.0"
description: "达到 90% 覆盖率的最终补充"
base: "dengbao_base"

clauses:
  # ===== 8.1.2 通信网络补充 =====
  - id: "8.1.2.26"
    name: "网络时间同步"
    pillar: "network"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应部署网络时间协议（NTP）服务"
    weight: 1.0
    questionnaire:
      questions:
        - id: "q1"
          text: "是否部署了 NTP 时间同步？"
          type: "yes_no"
          evidence_required: true
      pass_threshold: 1.0
    remediation:
      immediate:
        - "部署 NTP"
      short_term:
        - "冗余 NTP"
      long_term:
        - "授时服务"
    risk_level: "low"
    usage_frequency: "medium"

  - id: "8.1.2.27"
    name: "网络设备口令"
    pillar: "network"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应管理网络设备口令"
    weight: 2.0
    questionnaire:
      questions:
        - id: "q1"
          text: "网络设备口令是否满足复杂度要求？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "网络设备口令是否定期更换？"
          type: "yes_no"
          evidence_required: true
      pass_threshold: 1.0
    remediation:
      immediate:
        - "审查口令策略"
      short_term:
        - "定期更换"
      long_term:
        - "集中认证"
    risk_level: "high"
    usage_frequency: "high"

  - id: "8.1.2.28"
    name: "网络设备日志"
    pillar: "network"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应记录网络设备日志"
    weight: 2.0
    questionnaire:
      questions:
        - id: "q1"
          text: "是否启用网络设备日志记录？"
          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "日志是否集中收集和分析？"
          type: "yes_no"
          evidence_required: true
      pass_threshold: 1.0
    remediation:
      immediate:
        - "启用日志记录"
      short_term:
        - "集中分析"
      long_term:
        - "智能分析"
    risk_level: "medium"
    usage_frequency: "high"

  # ===== 8.1.3 边界补充 =====

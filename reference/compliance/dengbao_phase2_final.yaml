          type: "yes_no"
          evidence_required: true
        - id: "q2"
          text: "边界设备是否实施物理访问控制？"
          type: "yes_no"
          evidence_required: true
      pass_threshold: 1.0
    remediation:
      immediate:
        - "保护物理安全"
      short_term:
        - "实施访问控制"
      long_term:
        - "建立机房管理体系"
    risk_level: "low"
    usage_frequency: "medium"

  - id: "8.1.3.21"
    name: "边界设备冗余"
    pillar: "boundary"
    level: [2, 3]
    check_type: "questionnaire"
    description: "应部署冗余的边界防护设备"

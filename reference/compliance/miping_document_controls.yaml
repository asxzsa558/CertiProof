version: "2026.07-miping-eight-domain-v3"
basis:
  - "GB/T 39786-2021"
  - "GB/T 43206-2023"
  - "GB/T 43207-2023"
  - "GM/T 0116-2021"
  - "信息系统密码应用高风险判定指引（2020版）"
  - "商用密码应用安全性评估测评工具指引"
  - "商用密码应用安全性评估管理办法"
description: "CertiProof 商用密码应用安全自查标准库。覆盖四个技术层面和四个管理层面，用于企业内部差距分析，不代替经认定密评机构出具的正式密评结论。"
calibration:
  calibrated_at: "2026-07-22"
  scope: "企业内部商用密码应用自查；不对外出具具有证明作用的密评结论。"
  authoritative_sources:
    - id: "GBT-39786-2021"
      title: "信息安全技术 信息系统密码应用基本要求"
      status: "现行"
      purpose: "定义密码应用技术与管理要求。"
    - id: "GBT-43206-2023"
      title: "信息安全技术 信息系统密码应用测评要求"
      status: "现行；2024-04-01实施"
      purpose: "定义单元测评对象、方法和结果判定。"
    - id: "GBT-43207-2023"
      title: "信息安全技术 信息系统密码应用设计指南"
      status: "现行；2024-04-01实施"
      purpose: "校准密码应用方案的需求分析、设计内容和实施一致性。"
    - id: "GMT-0116-2021"
      title: "信息系统密码应用测评过程指南"
      status: "现行"
      purpose: "约束准备、方案、现场、分析和报告过程。"
    - id: "MIP-HIGH-RISK-2020"
      title: "信息系统密码应用高风险判定指引"
      status: "公开指引"
      purpose: "校准高风险条件、缓解措施和密钥全生命周期风险。"
    - id: "MIP-MEASURES-2023"
      title: "商用密码应用安全性评估管理办法"
      status: "现行；2023-11-01施行"
      purpose: "约束方案评估、现场评估、客观凭据、报告和留存边界。"
  decision_principles:
    - "文档出现算法、产品或制度名称只能作为候选证据，不能直接判定符合。"
    - "必须同时核对保护对象、实现机制、合规来源、责任主体和运行记录。"
    - "缺少适用性说明、现场证据或有效性验证时，不得自动判定通过。"
    - "不适用必须说明业务场景、等级依据、替代措施和审批记录。"
    - "高风险结论必须满足明确高风险条件；单纯缺少材料优先判为无法验证或中危差距。"
  severity_policy:
    high: "命中高风险指引条件，或缺失会直接影响重要数据、身份真实性、密钥安全及密码产品合规性。"
    medium: "制度、方案、记录或证据不完整，尚不能证明形成直接高风险。"
    low: "不影响核心密码措施有效性的记录、格式或维护性偏差。"
requirement_defaults:
  required_evidence: ["可定位的方案、制度、配置或运行记录", "明确的适用对象、责任主体和执行方式"]
  completeness: "证据应说明保护对象、密码措施、密钥或产品服务、责任主体及可核验记录；仅出现算法或产品名称不算完整。"
  negative_conditions: ["明确未采用所需密码保护措施", "使用来源或合规状态不明的密码产品服务", "密钥全生命周期缺少责任与记录", "证据之间相互矛盾"]
  severity: "medium"
  applicability: "根据测评等级、业务场景、密码应用方案和适用性论证确定；不得仅因未部署某类对象而自动判定不适用。"
  automation_boundary: "材料检查只能判断证据完整性；技术机制的正确性和有效性仍需自动工具或现场验证。"
  remediation_template: "补充“{requirement}”对应的密码应用设计、责任分工、配置依据和可审计运行记录。"

documents:
  system_crypto_scope:
    name: "信息系统及密码应用边界清单"
    aliases: ["信息系统及密码应用边界清单", "密评范围清单", "密码应用边界", "系统边界和资产清单"]
    basis: ["GM/T 0116-2021 测评准备与方案编制", "商用密码应用安全性评估管理办法第十一条、第十二条"]
    automation_boundary: "清单用于确定测评范围和对象，不证明对象上的密码措施已经正确有效实施。"
    controls:
      - id: "MIP-SCOPE-001"
        title: "测评对象和边界"
        required_points:
          - id: "P1"
            text: "明确系统名称、业务范围、网络边界、部署区域和责任主体"
            evidence_keywords: ["系统名称", "业务范围", "网络边界", "部署区域", "责任主体"]
            missing_judgement: "未形成可核验的信息系统和密码应用边界。"
          - id: "P2"
            text: "列明物理环境、网络通信、设备计算、应用和数据四类测评对象"
            evidence_keywords: ["物理环境", "网络通信", "设备计算", "应用数据", "测评对象"]
            missing_judgement: "未按四个技术层面列出测评对象。"
      - id: "MIP-SCOPE-002"
        title: "资产与责任映射"
        required_points:
          - id: "P1"
            text: "记录密码产品、密码服务、证书、密钥和使用这些能力的业务资产"
            evidence_keywords: ["密码产品", "密码服务", "证书", "密钥", "业务资产"]
            missing_judgement: "未建立密码资源与业务资产的对应关系。"
          - id: "P2"
            text: "为每类测评对象指定系统、密码和业务责任人"
            evidence_keywords: ["系统责任人", "密码责任人", "业务责任人", "联系方式"]
            missing_judgement: "未明确测评对象责任主体。"
      - id: "MIP-SCOPE-003"
        title: "重要数据与密码应用点映射"
        required_points:
          - id: "P1"
            text: "识别重要数据、敏感信息和涉及法律责任认定的业务行为"
            evidence_keywords: ["重要数据", "敏感信息", "法律责任", "业务行为", "数据分类"]
            missing_judgement: "未识别需要密码保护的重要数据和关键业务行为。"
          - id: "P2"
            text: "记录数据产生、传输、存储、使用和销毁环节对应的密码应用点"
            evidence_keywords: ["数据流向", "产生", "传输", "存储", "使用", "销毁", "密码应用点"]
            missing_judgement: "未建立数据生命周期与密码应用点的对应关系。"
      - id: "MIP-SCOPE-004"
        title: "适用性与边界变更"
        required_points:
          - id: "P1"
            text: "对不适用指标记录业务场景、等级依据、替代措施和审批结论"
            evidence_keywords: ["不适用", "业务场景", "等级依据", "替代措施", "审批"]
            missing_judgement: "不适用项缺少可核验的适用性论证。"
          - id: "P2"
            text: "建立资产、网络、业务和密码应用变化后的边界复核机制"
            evidence_keywords: ["边界变更", "资产变更", "网络变更", "业务变更", "重新评估"]
            missing_judgement: "未发现密码应用边界的变更复核机制。"

  crypto_algorithm_protocol_inventory:
    name: "密码算法、协议与证书清单"
    aliases: ["密码算法协议与证书清单", "算法协议证书清单", "密码算法清单", "证书清单"]
    basis: ["GB/T 39786-2021 通用要求", "信息系统密码应用高风险判定指引第5章", "商用密码应用安全性评估测评工具指引第4章"]
    automation_boundary: "清单可证明声明和台账，算法、协议、证书的正确性与有效性必须结合配置、抓包或自动工具核验。"
    controls:
      - id: "MIP-ALG-001"
        title: "算法协议使用清单"
        required_points:
          - id: "P1"
            text: "逐项记录算法、协议、密码套件、用途、调用位置和保护对象"
            evidence_keywords: ["算法", "协议", "密码套件", "用途", "调用位置", "保护对象"]
            missing_judgement: "未形成算法协议及其使用位置清单。"
          - id: "P2"
            text: "识别弱算法、过期协议、非合规参数并记录处置结论"
            evidence_keywords: ["弱算法", "过期协议", "不安全参数", "禁用", "处置结论"]
            missing_judgement: "未识别或处置弱算法和过期协议。"
      - id: "MIP-ALG-002"
        title: "数字证书清单"
        required_points:
          - id: "P1"
            text: "记录证书用途、主体、签发机构、算法、序列号、有效期和部署位置"
            evidence_keywords: ["证书用途", "签发机构", "签名算法", "序列号", "有效期", "部署位置"]
            missing_judgement: "数字证书台账缺少用途、算法或有效期信息。"
          - id: "P2"
            text: "建立证书申请、签发、更新、吊销和状态检查机制"
            evidence_keywords: ["证书申请", "签发", "更新", "吊销", "CRL", "OCSP"]
            missing_judgement: "未发现证书全生命周期和状态检查机制。"
      - id: "MIP-ALG-003"
        title: "算法强度与来源合规"
        severity: "high"
        required_points:
          - id: "P1"
            text: "证明所用算法符合密码相关国家标准或行业标准且安全强度满足保护需求"
            evidence_keywords: ["国家标准", "行业标准", "算法强度", "SM2", "SM3", "SM4", "RSA 2048"]
            negative_conditions: ["使用MD5、DES、SHA-1保护重要数据", "RSA密钥不足2048比特", "使用未经安全论证的自研算法"]
            missing_judgement: "未证明密码算法来源和安全强度满足要求。"
          - id: "P2"
            text: "明确禁止弱算法、未知算法和不符合要求参数的配置基线"
            evidence_keywords: ["禁止算法", "弱算法", "未知算法", "参数基线", "禁用清单"]
            missing_judgement: "未建立弱算法和不安全参数禁用基线。"
      - id: "MIP-ALG-004"
        title: "清单与实际配置一致性"
        required_points:
          - id: "P1"
            text: "定期将算法协议证书清单与生产配置、抓包和扫描结果核对"
            evidence_keywords: ["配置核对", "抓包", "扫描结果", "一致性", "定期复核"]
            missing_judgement: "未发现清单与生产配置的一致性核对。"
          - id: "P2"
            text: "对清单外算法、协议、证书或密码套件建立发现和处置记录"
            evidence_keywords: ["清单外", "未知证书", "未知协议", "处置记录", "偏差"]
            missing_judgement: "未发现清单外密码能力的偏差处置机制。"

  crypto_personnel_records:
    name: "密码相关人员管理记录"
    aliases: ["密码相关人员管理记录", "密码人员管理", "密码岗位人员记录", "密码培训记录"]
    basis: ["GB/T 39786-2021 人员管理要求", "商用密码应用安全性评估管理办法第十二条、第十三条"]
    automation_boundary: "制度文字不能替代人员授权、培训、交接和审计的实际记录。"
    controls:
      - id: "MIP-PER-001"
        title: "岗位、准入和制约"
        required_points:
          - id: "P1"
            text: "明确密码负责人、管理员、操作员和审计员的职责及相互制约"
            evidence_keywords: ["密码负责人", "管理员", "操作员", "审计员", "职责分离"]
            missing_judgement: "未形成密码相关岗位职责和制约记录。"
          - id: "P2"
            text: "保存关键人员背景审查、保密承诺和授权审批记录"
            evidence_keywords: ["背景审查", "保密承诺", "授权审批", "关键人员"]
            missing_judgement: "未发现关键人员准入和授权证据。"
      - id: "MIP-PER-002"
        title: "培训考核与离岗"
        required_points:
          - id: "P1"
            text: "定期开展密码政策、岗位技能和应急处置培训考核"
            evidence_keywords: ["密码培训", "岗位技能", "应急处置", "考核", "培训记录"]
            missing_judgement: "未发现密码相关培训和考核记录。"
          - id: "P2"
            text: "人员调岗离职时回收账号、权限、介质和密码材料并留痕"
            evidence_keywords: ["调岗", "离职", "账号回收", "权限回收", "介质回收", "交接记录"]
            missing_judgement: "未发现人员变更离岗的回收和交接证据。"
      - id: "MIP-PER-003"
        title: "双人控制与独立监督"
        required_points:
          - id: "P1"
            text: "关键密钥操作和高风险密码配置变更实行双人控制或复核"
            evidence_keywords: ["双人控制", "双人复核", "密钥操作", "配置变更", "审批"]
            missing_judgement: "未发现关键密码操作的双人控制或复核证据。"
          - id: "P2"
            text: "审计人员独立于日常密码操作并定期复核特权行为"
            evidence_keywords: ["独立审计", "职责分离", "特权行为", "定期复核", "审计员"]
            missing_judgement: "未证明密码审计岗位具备必要独立性。"

  physical_environment_evidence:
    name: "物理和环境安全现场证据"
    aliases: ["物理和环境安全现场证据", "机房密码应用证据", "门禁监控完整性证据", "物理环境检查记录"]
    basis: ["GB/T 39786-2021 物理和环境安全要求", "GB/T 43206-2023 物理和环境安全测评要求", "信息系统密码应用高风险判定指引第6章"]
    automation_boundary: "必须提供门禁、监控、密码模块和运行记录的现场证据；仅靠远程网络扫描不能判定。"
    controls:
      - id: "MIP-PHY-001"
        title: "电子门禁身份鉴别"
        required_points:
          - id: "P1"
            text: "现场配置证明电子门禁使用密码技术鉴别进入人员身份"
            evidence_keywords: ["电子门禁", "身份鉴别", "密码技术", "门禁系统", "现场截图"]
            missing_judgement: "未提供门禁身份鉴别的现场配置证据。"
          - id: "P2"
            text: "提供门禁密码模块、产品或服务的合规证明及部署对应关系"
            evidence_keywords: ["密码模块", "认证证书", "产品型号", "部署位置", "门禁"]
            missing_judgement: "门禁密码能力与合规产品无法对应。"
      - id: "MIP-PHY-002"
        title: "物理访问记录完整性"
        required_points:
          - id: "P1"
            text: "门禁记录和视频监控记录采用密码技术保护完整性并可验证"
            evidence_keywords: ["门禁记录", "视频监控", "完整性", "数字签名", "校验"]
            missing_judgement: "未提供物理访问记录完整性保护证据。"
          - id: "P2"
            text: "保存完整性校验、异常告警和审计抽查记录"
            evidence_keywords: ["完整性校验", "异常告警", "审计抽查", "校验记录"]
            missing_judgement: "未发现物理记录完整性保护的运行证据。"
      - id: "MIP-PHY-003"
        title: "现场机制有效性与缓解措施"
        required_points:
          - id: "P1"
            text: "通过现场测试或抽样记录证明门禁鉴别和记录完整性机制实际有效"
            evidence_keywords: ["现场测试", "抽样", "鉴别结果", "完整性验证", "测试记录"]
            missing_judgement: "未提供物理环境密码机制有效性验证记录。"
          - id: "P2"
            text: "未采用密码技术时记录生物识别、专人值守、登记和视频监控等缓解措施及适用性论证"
            evidence_keywords: ["生物识别", "专人值守", "人员登记", "视频监控", "缓解措施", "适用性"]
            missing_judgement: "缺少物理身份鉴别替代措施的适用性和有效性证据。"

  network_communication_evidence:
    name: "网络和通信安全现场证据"
    aliases: ["网络和通信安全现场证据", "通信密码配置", "TLS TLCP 配置", "VPN密码配置", "通信抓包"]
    basis: ["GB/T 39786-2021 网络和通信安全要求", "GB/T 43206-2023 网络和通信安全测评要求", "信息系统密码应用高风险判定指引第7章", "商用密码应用安全性评估测评工具指引"]
    automation_boundary: "协议和证书工具只能形成辅助证据；业务通信范围、双向鉴别、边界策略和有效性仍需配置、抓包与现场记录。"
    controls:
      - id: "MIP-NET-001"
        title: "通信实体身份鉴别与信道保护"
        required_points:
          - id: "P1"
            text: "配置和抓包证明确认通信实体身份并建立受密码保护的通信信道"
            evidence_keywords: ["通信实体", "双向认证", "TLS", "TLCP", "VPN", "抓包"]
            missing_judgement: "未提供通信实体鉴别和安全信道证据。"
          - id: "P2"
            text: "通信数据机密性和完整性使用适用算法、协议和密钥参数"
            evidence_keywords: ["机密性", "完整性", "SM2", "SM3", "SM4", "密码套件", "密钥长度"]
            missing_judgement: "未证明通信数据使用适用密码参数保护。"
      - id: "MIP-NET-002"
        title: "边界访问控制信息保护"
        required_points:
          - id: "P1"
            text: "网络边界访问控制策略、配置和日志具备完整性保护"
            evidence_keywords: ["网络边界", "访问控制", "策略", "配置完整性", "日志完整性"]
            missing_judgement: "未提供边界访问控制信息完整性保护证据。"
          - id: "P2"
            text: "证书链、证书状态、协议版本和密码套件检查结果可追溯"
            evidence_keywords: ["证书链", "证书状态", "协议版本", "密码套件", "检查结果"]
            missing_judgement: "网络通信密码配置缺少可追溯核验结果。"
      - id: "MIP-NET-003"
        title: "外联与集中管理通道"
        severity: "high"
        required_points:
          - id: "P1"
            text: "识别跨边界、远程接入和集中管理通信，并对通信实体进行适用等级的身份鉴别"

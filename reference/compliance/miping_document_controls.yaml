            missing_judgement: "未发现密钥备份恢复和归档要求。"
      - id: "MIP-KEY-004"
        severity: "high"
        title: "密钥撤销销毁与应急"
        required_points:
          - id: "P1"
            text: "规定密钥撤销、停用和安全销毁"

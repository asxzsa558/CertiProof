version: "3.8"

services:
  # 数据库
  db:
    image: postgres:15-alpine
    container_name: certiproof-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-certiproof}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-certiproof}
      POSTGRES_DB: ${POSTGRES_DB:-certiproof}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-certiproof}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - certiproof-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: certiproof-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - certiproof-net

  # 前端
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: certiproof-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - certiproof-net

  # 后端（包含 Orchestrator）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: certiproof-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-certiproof}:${POSTGRES_PASSWORD:-certiproof}@db:5432/${POSTGRES_DB:-certiproof}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      MCP_GATEWAY_URL: http://mcp-gateway:9000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./reference:/reference
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mcp-gateway:
        condition: service_started
    restart: unless-stopped
    networks:
      - certiproof-net

  # MCP Gateway
  mcp-gateway:
    build:
      context: ./mcp-servers/gateway
      dockerfile: Dockerfile
    container_name: certiproof-mcp-gateway
    depends_on:
      - security-tools
      - ocr-server
      - ssh-checker
      - fast-scanner
      - web-tools
      - network-tools
      - db-tools
      - windows-tools
    restart: unless-stopped
    networks:
      - certiproof-net

  # 统一安全工具服务 (nmap + testssl + nuclei + hydra)
  security-tools:
    build:
      context: ./mcp-servers/security-tools
      dockerfile: Dockerfile
    container_name: certiproof-security-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - certiproof-net

  # SSH 白盒配置核查服务
  ssh-checker:
    build:
      context: ./mcp-servers/ssh-checker
      dockerfile: Dockerfile
    container_name: certiproof-ssh-checker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - certiproof-net

  # 快速端口扫描服务 (masscan + fping)
  fast-scanner:
    build:
      context: ./mcp-servers/fast-scanner
      dockerfile: Dockerfile
    container_name: certiproof-fast-scanner
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - certiproof-net

  # Web 安全检测服务 (nikto + sqlmap + gobuster + ffuf)
  web-tools:
    build:
      context: ./mcp-servers/web-tools
      dockerfile: Dockerfile
    container_name: certiproof-web-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - certiproof-net

  # 网络设备检测服务 (snmpwalk + onesixtyone)
  network-tools:
    build:
      context: ./mcp-servers/network-tools
      dockerfile: Dockerfile
    container_name: certiproof-network-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - certiproof-net

  # 数据库安全检测服务 (redis-cli + tnscmd10g + mysql-client)
  db-tools:
    build:
      context: ./mcp-servers/db-tools
      dockerfile: Dockerfile
    container_name: certiproof-db-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - certiproof-net

  # Windows/AD 安全检测服务 (enum4linux-ng + netexec + impacket)
  windows-tools:
    build:
      context: ./mcp-servers/windows-tools
      dockerfile: Dockerfile
    container_name: certiproof-windows-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - certiproof-net

  # OCR MCP Server
  ocr-server:
    build:
      context: ./mcp-servers/ocr-server
      dockerfile: Dockerfile
    container_name: certiproof-ocr-server
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    restart: unless-stopped
    networks:
      - certiproof-net

volumes:
  postgres_data:
  redis_data:

networks:
  certiproof-net:
    driver: bridge

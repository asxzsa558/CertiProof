version: "3.8"

x-http-healthcheck: &http-healthcheck
  interval: 20s
  timeout: 10s
  retries: 5
  start_period: 20s

x-worker-common: &worker-common
  image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/backend:${CERTIPROOF_VERSION:-latest}
  build:
    context: ./backend
    dockerfile: Dockerfile
  command: ["python", "-m", "app.worker"]
  environment: &worker-environment
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-certiproof}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-certiproof}
    REDIS_URL: redis://redis:6379/0
    SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
    APP_ENV: ${APP_ENV:-production}
    CERTIPROOF_VERSION: ${CERTIPROOF_VERSION:-source}
    DEBUG: ${DEBUG:-false}
    ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
    LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-5}
    LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
    MCP_GATEWAY_URL: http://mcp-gateway:9000
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    OPENAI_API_BASE: ${OPENAI_API_BASE:-}
    OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
    LLM_RUNTIME_POLICY: ${LLM_RUNTIME_POLICY:-auto}
    LLM_GPU_AVAILABLE: ${LLM_GPU_AVAILABLE:-auto}
    VLLM_API_BASE: ${VLLM_API_BASE:-http://vllm:8000/v1}
    VLLM_MODEL: ${VLLM_MODEL:-}
    LLAMA_CPP_API_BASE: ${LLAMA_CPP_API_BASE:-http://llama-cpp:8080/v1}
    LLAMA_CPP_MODEL: ${LLAMA_CPP_MODEL:-}
    OLLAMA_REQUEST_TIMEOUT_SECONDS: ${OLLAMA_REQUEST_TIMEOUT_SECONDS:-300}
    OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
    OLLAMA_THINK: ${OLLAMA_THINK:-false}
    TASK_EXECUTION_MODE: worker
    TASK_WORKER_POLL_SECONDS: ${TASK_WORKER_POLL_SECONDS:-3}
    TASK_LEASE_MINUTES: ${TASK_LEASE_MINUTES:-2}
    MONITORING_WORKER_BATCH_SIZE: ${MONITORING_WORKER_BATCH_SIZE:-5}
    DOCUMENT_ANALYSIS_MODE: ${DOCUMENT_ANALYSIS_MODE:-standard}
    GRAPH_NAME: ${GRAPH_NAME:-certiproof}
    GRAPH_REQUIRED: ${GRAPH_REQUIRED:-true}
    EMBEDDING_SERVER_URL: http://embedding-server:8017
    DOCUMENT_EMBEDDING_MODEL: ${DOCUMENT_EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
    DOCUMENT_EMBEDDING_DIMENSION: ${DOCUMENT_EMBEDDING_DIMENSION:-1024}
  volumes:
    - ./reference:/reference
    - uploads_data:/app/uploads
  depends_on:
    backend:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
    redis:
      condition: service_healthy
    mcp-gateway:
      condition: service_healthy
    embedding-server:
      condition: service_healthy
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-m", "app.worker_health"]
    interval: 20s
    timeout: 10s
    retries: 5
    start_period: 30s
  mem_limit: ${WORKER_MEMORY_LIMIT:-2g}
  cpus: ${WORKER_CPU_LIMIT:-2.0}
  pids_limit: ${WORKER_PIDS_LIMIT:-512}
  logging: &default-logging
    driver: json-file
    options:
      max-size: ${LOG_MAX_SIZE:-20m}
      max-file: ${LOG_MAX_FILES:-5}
  networks:
    - certiproof-net

services:
  # 数据库
  db:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/postgres:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: certiproof-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-certiproof}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-certiproof}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: ${POSTGRES_MEMORY_LIMIT:-4g}
    cpus: ${POSTGRES_CPU_LIMIT:-2.0}
    pids_limit: 512
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-certiproof}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - certiproof-net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: certiproof-redis
    volumes:
      - redis_data:/data
    mem_limit: ${REDIS_MEMORY_LIMIT:-1g}
    cpus: ${REDIS_CPU_LIMIT:-1.0}
    pids_limit: 256
    logging: *default-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - certiproof-net

  # 前端
  frontend:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/frontend:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: certiproof-frontend
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      <<: *http-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:80/health', timeout=3)"]
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEMORY_LIMIT:-512m}
    cpus: ${FRONTEND_CPU_LIMIT:-1.0}
    pids_limit: 256
    logging: *default-logging
    networks:
      - certiproof-net

  # 后端（包含 Orchestrator）
  backend:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/backend:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: certiproof-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-certiproof}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-certiproof}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      APP_ENV: ${APP_ENV:-production}
      CERTIPROOF_VERSION: ${CERTIPROOF_VERSION:-source}
      DEBUG: ${DEBUG:-false}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
      LOGIN_RATE_LIMIT_ATTEMPTS: ${LOGIN_RATE_LIMIT_ATTEMPTS:-5}
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}
      CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000"]}'
      MCP_GATEWAY_URL: http://mcp-gateway:9000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      LLM_RUNTIME_POLICY: ${LLM_RUNTIME_POLICY:-auto}
      LLM_GPU_AVAILABLE: ${LLM_GPU_AVAILABLE:-auto}
      VLLM_API_BASE: ${VLLM_API_BASE:-http://vllm:8000/v1}
      VLLM_MODEL: ${VLLM_MODEL:-}
      LLAMA_CPP_API_BASE: ${LLAMA_CPP_API_BASE:-http://llama-cpp:8080/v1}
      LLAMA_CPP_MODEL: ${LLAMA_CPP_MODEL:-}
      OLLAMA_REQUEST_TIMEOUT_SECONDS: ${OLLAMA_REQUEST_TIMEOUT_SECONDS:-300}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_THINK: ${OLLAMA_THINK:-false}
      TASK_EXECUTION_MODE: ${TASK_EXECUTION_MODE:-worker}
      DOCUMENT_ANALYSIS_MODE: ${DOCUMENT_ANALYSIS_MODE:-standard}
      GRAPH_NAME: ${GRAPH_NAME:-certiproof}
      GRAPH_REQUIRED: ${GRAPH_REQUIRED:-true}
      EMBEDDING_SERVER_URL: http://embedding-server:8017
      DOCUMENT_EMBEDDING_MODEL: ${DOCUMENT_EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      DOCUMENT_EMBEDDING_DIMENSION: ${DOCUMENT_EMBEDDING_DIMENSION:-1024}
    volumes:
      - ./reference:/reference
      - uploads_data:/app/uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      mcp-gateway:
        condition: service_healthy
      embedding-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      <<: *http-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
    mem_limit: ${BACKEND_MEMORY_LIMIT:-2g}
    cpus: ${BACKEND_CPU_LIMIT:-2.0}
    pids_limit: 512
    logging: *default-logging
    networks:
      - certiproof-net

  # 云上生产入口；仅在 --profile production 时启动，自动管理 HTTPS。
  edge:
    profiles: ["production"]
    image: caddy:2.8-alpine
    container_name: certiproof-edge
    environment:
      CERTIPROOF_DOMAIN: ${CERTIPROOF_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: ${EDGE_MEMORY_LIMIT:-512m}
    cpus: ${EDGE_CPU_LIMIT:-1.0}
    pids_limit: 256
    logging: *default-logging
    networks:
      - certiproof-net

  migrate:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/backend:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "app.migrate"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-certiproof}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/${POSTGRES_DB:-certiproof}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      GRAPH_NAME: ${GRAPH_NAME:-certiproof}
      GRAPH_REQUIRED: ${GRAPH_REQUIRED:-true}
      DOCUMENT_EMBEDDING_MODEL: ${DOCUMENT_EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      DOCUMENT_EMBEDDING_DIMENSION: ${DOCUMENT_EMBEDDING_DIMENSION:-1024}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./reference:/reference
      - uploads_data:/app/uploads
    restart: "no"
    networks:
      - certiproof-net

  # 交互扫描 Worker（聊天、快捷按钮、/ 命令共用）
  interactive-worker:
    <<: *worker-common
    container_name: certiproof-interactive-worker
    environment:
      <<: *worker-environment
      WORKER_ROLE: interactive
      INTERACTIVE_SCAN_MAX_CONCURRENT: ${INTERACTIVE_SCAN_MAX_CONCURRENT:-5}

  # 文档解析、归类与合规判定 Worker
  document-worker:
    <<: *worker-common
    container_name: certiproof-document-worker
    environment:
      <<: *worker-environment
      WORKER_ROLE: document

  # 差距分析和现场测评技术检测 Worker
  assessment-worker:
    <<: *worker-common
    container_name: certiproof-assessment-worker
    environment:
      <<: *worker-environment
      WORKER_ROLE: assessment

  # 整改复查与复测 Worker
  verification-worker:
    <<: *worker-common
    container_name: certiproof-verification-worker
    environment:
      <<: *worker-environment
      WORKER_ROLE: verification

  # 定时检测、归档和会话摘要 Worker
  maintenance-worker:
    <<: *worker-common
    container_name: certiproof-maintenance-worker
    environment:
      <<: *worker-environment
      WORKER_ROLE: maintenance

  # 仅用于自动化验收的隔离 SSH/Web 靶标，不随生产服务启动。
  e2e-target:
    profiles: ["acceptance"]
    build:
      context: .
      dockerfile: docker/e2e-target/Dockerfile
    container_name: certiproof-e2e-target
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; [socket.create_connection(('127.0.0.1', p), 2).close() for p in (22, 80, 443)]"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: "no"
    networks:
      - certiproof-net

  # MCP Gateway
  mcp-gateway:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/mcp-gateway:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./mcp-servers/gateway
      dockerfile: Dockerfile
    container_name: certiproof-mcp-gateway
    depends_on:
      security-tools:
        condition: service_healthy
      ocr-server:
        condition: service_healthy
      ssh-checker:
        condition: service_healthy
      fast-scanner:
        condition: service_healthy
      web-tools:
        condition: service_healthy
      network-tools:
        condition: service_healthy
      db-tools:
        condition: service_healthy
      windows-tools:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      <<: *http-healthcheck
      timeout: 20s
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9000/tools', timeout=5)"]
    mem_limit: ${TOOL_MEMORY_LIMIT:-1g}
    cpus: ${TOOL_CPU_LIMIT:-1.0}
    pids_limit: 512
    logging: *default-logging
    networks:
      - certiproof-net

  # 统一安全工具服务 (nmap + testssl + nuclei + hydra)
  security-tools:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/security-tools:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./mcp-servers/security-tools
      dockerfile: Dockerfile
    container_name: certiproof-security-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      <<: *http-healthcheck
      timeout: 20s
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=15)"]
    mem_limit: ${SECURITY_TOOL_MEMORY_LIMIT:-2g}
    cpus: ${SECURITY_TOOL_CPU_LIMIT:-2.0}
    pids_limit: 1024
    logging: *default-logging
    networks:
      - certiproof-net

  # SSH 白盒配置核查服务
  ssh-checker:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/ssh-checker:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./mcp-servers/ssh-checker
      dockerfile: Dockerfile
    container_name: certiproof-ssh-checker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      <<: *http-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8016/health', timeout=5)"]
    mem_limit: ${TOOL_MEMORY_LIMIT:-1g}
    cpus: ${TOOL_CPU_LIMIT:-1.0}
    pids_limit: 512
    logging: *default-logging
    networks:
      - certiproof-net

  # 快速端口扫描服务 (masscan + fping)
  fast-scanner:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/fast-scanner:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./mcp-servers/fast-scanner
      dockerfile: Dockerfile
    container_name: certiproof-fast-scanner
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      <<: *http-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health', timeout=5)"]
    mem_limit: ${TOOL_MEMORY_LIMIT:-1g}
    cpus: ${TOOL_CPU_LIMIT:-1.0}
    pids_limit: 512
    logging: *default-logging
    networks:
      - certiproof-net

  # Web 安全检测服务 (nikto + sqlmap + gobuster + ffuf)
  web-tools:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/web-tools:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./mcp-servers/web-tools
      dockerfile: Dockerfile
    container_name: certiproof-web-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      <<: *http-healthcheck
      timeout: 20s
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8012/health', timeout=15)"]
    mem_limit: ${WEB_TOOL_MEMORY_LIMIT:-2g}
    cpus: ${WEB_TOOL_CPU_LIMIT:-2.0}
    pids_limit: 1024
    logging: *default-logging
    networks:
      - certiproof-net

  # 网络设备检测服务 (snmpwalk + onesixtyone)
  network-tools:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/network-tools:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./mcp-servers/network-tools
      dockerfile: Dockerfile
    container_name: certiproof-network-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      <<: *http-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8013/health', timeout=5)"]
    mem_limit: ${TOOL_MEMORY_LIMIT:-1g}
    cpus: ${TOOL_CPU_LIMIT:-1.0}
    pids_limit: 512
    logging: *default-logging
    networks:
      - certiproof-net

  # 数据库安全检测服务 (redis-cli + tnscmd10g + mysql-client)
  db-tools:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/db-tools:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./mcp-servers/db-tools
      dockerfile: Dockerfile
    container_name: certiproof-db-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      <<: *http-healthcheck
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8015/health', timeout=5)"]
    mem_limit: ${TOOL_MEMORY_LIMIT:-1g}
    cpus: ${TOOL_CPU_LIMIT:-1.0}
    pids_limit: 512
    logging: *default-logging
    networks:
      - certiproof-net

  # Windows/AD 安全检测服务 (enum4linux-ng + netexec + impacket)
  windows-tools:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/windows-tools:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./mcp-servers/windows-tools
      dockerfile: Dockerfile
    container_name: certiproof-windows-tools
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      <<: *http-healthcheck
      timeout: 20s
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8014/health', timeout=15)"]
    mem_limit: ${TOOL_MEMORY_LIMIT:-1g}
    cpus: ${TOOL_CPU_LIMIT:-1.0}
    pids_limit: 512
    logging: *default-logging
    networks:
      - certiproof-net

  # NVIDIA GPU 本地推理；仅在 gpu profile 中启动。
  vllm:
    profiles: ["gpu"]
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.19.1}
    container_name: certiproof-vllm
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3-14B}
      - --served-model-name
      - ${VLLM_MODEL:-Qwen/Qwen3-14B}
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --max-model-len
      - ${VLLM_MAX_MODEL_LEN:-16384}
      - --gpu-memory-utilization
      - ${VLLM_GPU_MEMORY_UTILIZATION:-0.9}
    environment:
      HF_HOME: /models/huggingface
      HF_HUB_OFFLINE: ${HF_HUB_OFFLINE:-0}
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - llm_models:/models
    ipc: host
    runtime: nvidia
    pids_limit: 2048
    logging: *default-logging
    restart: unless-stopped
    networks:
      - certiproof-net

  # 纯 CPU 离线推理；仅在 cpu-local profile 中启动。
  llama-cpp:
    profiles: ["cpu-local"]
    image: ${LLAMA_CPP_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    container_name: certiproof-llama-cpp
    command:
      - -m
      - /models/${LLAMA_CPP_MODEL_FILE:-qwen3-14b-q4_k_m.gguf}
      - --alias
      - ${LLAMA_CPP_MODEL:-qwen3-14b}
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - --ctx-size
      - ${LLAMA_CPP_CONTEXT_SIZE:-16384}
      - --parallel
      - ${LLAMA_CPP_PARALLEL:-1}
    volumes:
      - ${LLM_MODEL_DIR:-./models/llm}:/models:ro
    mem_limit: ${LLAMA_CPP_MEMORY_LIMIT:-24g}
    cpus: ${LLAMA_CPP_CPU_LIMIT:-16.0}
    pids_limit: 1024
    logging: *default-logging
    restart: unless-stopped
    networks:
      - certiproof-net

  # OCR MCP Server
  ocr-server:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/ocr-server:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./mcp-servers/ocr-server
      dockerfile: Dockerfile
    container_name: certiproof-ocr-server
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      PADDLE_DEVICE: ${PADDLE_DEVICE:-cpu}
      PADDLE_PDX_MODEL_SOURCE: ${PADDLE_PDX_MODEL_SOURCE:-BOS}
      DOCUMENT_OCR_ENGINE: ${DOCUMENT_OCR_ENGINE:-auto}
    volumes:
      - ocr_models:/root/.paddlex
    restart: unless-stopped
    healthcheck:
      <<: *http-healthcheck
      start_period: 60s
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/health', timeout=5)"]
    mem_limit: ${OCR_MEMORY_LIMIT:-8g}
    cpus: ${OCR_CPU_LIMIT:-4.0}
    pids_limit: 1024
    logging: *default-logging
    networks:
      - certiproof-net

  # 本地多语言文本向量服务（ONNX Runtime，无外部授权依赖）
  embedding-server:
    image: ${CERTIPROOF_IMAGE_PREFIX:-certiproof}/embedding-server:${CERTIPROOF_VERSION:-latest}
    build:
      context: ./mcp-servers/embedding-server
      dockerfile: Dockerfile
    container_name: certiproof-embedding-server
    environment:
      DOCUMENT_EMBEDDING_MODEL: ${DOCUMENT_EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      DOCUMENT_EMBEDDING_DIMENSION: ${DOCUMENT_EMBEDDING_DIMENSION:-1024}
      EMBEDDING_CACHE_DIR: /models
      EMBEDDING_THREADS: ${EMBEDDING_THREADS:-2}
      HF_ENDPOINT: ${HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_DISABLE_XET: ${HF_HUB_DISABLE_XET:-1}
    volumes:
      - embedding_models:/models
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8017/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    mem_limit: ${EMBEDDING_MEMORY_LIMIT:-6g}
    cpus: ${EMBEDDING_CPU_LIMIT:-4.0}
    pids_limit: 1024
    logging: *default-logging
    networks:
      - certiproof-net

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  ocr_models:
  embedding_models:
  llm_models:
  caddy_data:
  caddy_config:

networks:
  certiproof-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16
